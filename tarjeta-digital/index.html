<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dra. Claudia Devico - Tarjeta Digital</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;0,700;1,600&family=Manrope:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #785916;
            --primary-light: #d4ac61;
            --bg-dark: #0a0a0a;
            --bg-card: rgba(25, 28, 29, 0.85);
            --text-white: #ffffff;
            --text-gray: #a1a1aa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background: var(--bg-dark);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
            position: relative;
        }

        /* Watermark */
        .watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 400px;
            opacity: 0.03;
            pointer-events: none;
            z-index: -1;
        }

        /* Enhanced Bokeh Background */
        .background-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            filter: blur(100px);
            opacity: 0.6;
            background: var(--bg-dark);
        }

        .blob {
            position: absolute;
            background: var(--primary);
            border-radius: 50%;
            transition: transform 0.2s ease-out;
            animation: move linear infinite;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            top: -100px;
            left: -100px;
            background: radial-gradient(circle, #785916, transparent);
            animation-duration: 20s;
        }

        .blob-2 {
            width: 500px;
            height: 500px;
            bottom: -150px;
            right: -150px;
            background: radial-gradient(circle, #d4ac6122, transparent);
            animation-duration: 25s;
        }

        @keyframes move {
            0% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(100px, 50px) scale(1.1);
            }

            66% {
                transform: translate(-50px, 100px) scale(0.9);
            }

            100% {
                transform: translate(0, 0) scale(1);
            }
        }

        .card-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 1.2s ease-out;
            position: relative;
            z-index: 10;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            margin-bottom: 35px;
        }

        .logo-section img {
            width: 240px;
            height: auto;
            /* Convertir colores oscuros (azul) a blanco para visibilidad */
            filter: brightness(0) invert(1) brightness(1.8) contrast(1.2);
            mix-blend-mode: screen;
            opacity: 1;
        }

        .info-section {
            margin-bottom: 40px;
        }

        /* Signature Reveal Animation */
        .info-section h1 {
            font-family: 'Newsreader', serif;
            font-size: 2.8rem;
            font-style: italic;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #ffffff, #d4ac61, #ffffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            display: inline-block;
            mask-image: linear-gradient(90deg, black var(--reveal), transparent var(--reveal));
            -webkit-mask-image: linear-gradient(90deg, black var(--reveal), transparent var(--reveal));
            --reveal: 0%;
            animation: revealSignature 2s ease-out forwards;
        }

        @keyframes revealSignature {
            to {
                --reveal: 100%;
            }
        }

        @property --reveal {
            syntax: '<percentage>';
            initial-value: 0%;
            inherits: false;
        }

        .info-section h1::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 15%;
            right: 15%;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--primary-light), transparent);
            box-shadow: 0 0 10px var(--primary-light);
            animation: lineExpand 1.5s ease-out 1s forwards;
            transform: scaleX(0);
        }

        @keyframes lineExpand {
            to {
                transform: scaleX(1);
            }
        }

        .info-section p {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: var(--primary-light);
            font-weight: 700;
            margin-bottom: 15px;
            margin-top: 10px;
            text-shadow: 0 0 10px rgba(120, 89, 22, 0.3);
        }

        .description {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-gray);
            max-width: 340px;
            margin: 0 auto;
            font-weight: 400;
            font-style: italic;
            margin-bottom: 25px;
        }

        /* vCard Button */
        .vcard-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-family: 'Manrope', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 50px 30px rgba(0, 0, 0, 0.4), 0 0 20px rgba(120, 89, 22, 0.4);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .vcard-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 25px rgba(120, 89, 22, 0.6);
        }

        .vcard-btn svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
            width: 100%;
            margin-top: 40px;
        }

        .link-item {
            text-decoration: none;
            color: var(--text-white);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .link-item:active {
            transform: scale(0.9);
        }

        .icon-wrapper {
            width: 76px;
            height: 76px;
            background: var(--bg-card);
            border: 1px solid rgba(212, 172, 97, 0.3);
            border-radius: 50%;
            display: center;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6),
                0 0 15px rgba(120, 89, 22, 0.2);
            position: relative;
            overflow: hidden;
            display: flex;
        }

        .icon-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            background: radial-gradient(circle, var(--primary-light) 0%, transparent 70%);
            opacity: 0.15;
            animation: pulse 2.5s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.8);
                opacity: 0.1;
            }

            50% {
                transform: scale(1.15);
                opacity: 0.3;
            }

            100% {
                transform: scale(0.8);
                opacity: 0.1;
            }
        }

        .icon-wrapper svg {
            width: 32px;
            height: 32px;
            fill: var(--text-white);
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.3));
            z-index: 2;
        }

        .link-label {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-gray);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .footer {
            margin-top: 30px;
            padding-bottom: 20px;
            font-size: 0.6rem;
            color: var(--text-gray);
            opacity: 0.4;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* Floating Share Button */
        .share-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: var(--bg-card);
            border: 1px solid var(--primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            z-index: 100;
            transition: all 0.3s ease;
        }

        .share-btn:hover {
            transform: rotate(-15deg) scale(1.1);
            background: var(--primary);
        }

        .share-btn svg {
            width: 20px;
            height: 20px;
            fill: var(--text-white);
        }

        @media print {
            body {
                background: #000 !important;
            }

            .background-blobs,
            .share-btn,
            .vcard-btn {
                display: none;
            }

            .card-container {
                transform: none !important;
            }

            .footer {
                opacity: 1;
                color: #444;
            }
        }
    </style>
</head>

    <script>
        // vCard Download
        function downloadVCard() {
            const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Dra. Claudia Devico
ORG:Estudio Jurídico Devico
TITLE:Abogada Penalista
TEL;TYPE=CELL,VOICE:+5493512355442
EMAIL;TYPE=PREF,INTERNET:contacto@abogadadevico.com
URL:https://abogadadevico.com/
ADR;TYPE=WORK,POSTAL,PARCEL:;;Caseros 551;Cordoba;;5000;Argentina
END:VCARD`;
            const blob = new Blob([vcard], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Claudia_Devico.vcf';
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }

        // Parallax Effect
        window.addEventListener('deviceorientation', (event) => {
            const x = event.beta;  // In degree in range [-180,180]
            const y = event.gamma; // In degree in range [-90,90]

            const b1 = document.getElementById('blob1');
            const b2 = document.getElementById('blob2');

            const moveX = y / 2;
            const moveY = (x - 45) / 2; // Subtracting 45 assuming a normal holding angle

            b1.style.transform = `translate(${moveX}px, ${moveY}px)`;
            b2.style.transform = `translate(${-moveX}px, ${-moveY}px)`;
        });

        // Share API
        async function shareCard() {
            const shareData = {
                title: 'Dra. Claudia Devico - Tarjeta Digital',
                text: 'Contacto profesional - Abogada Penalista',
                url: window.location.href
            };

            try {
                if (navigator.share) {
                    await navigator.share(shareData);
                } else {
                    // Fallback to copy URL
                    await navigator.clipboard.writeText(window.location.href);
                    alert('Enlace copiado al portapapeles');
                }
            } catch (err) {
                console.log('Error sharing:', err);
            }
        }
    </script>
